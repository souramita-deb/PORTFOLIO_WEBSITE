<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nightSkyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1419;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f23;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nightTreeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2818;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="fogGradient" cx="50%" cy="80%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="nightLandGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0f0f23;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="nightLandTexture" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Stars -->
  <circle cx="200" cy="50" r="1" fill="#ffffff" opacity="0.8"/>
  <circle cx="350" cy="80" r="1.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="500" cy="40" r="1" fill="#ffffff" opacity="0.7"/>
  <circle cx="650" cy="70" r="1.2" fill="#ffffff" opacity="0.8"/>
  <circle cx="800" cy="50" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="950" cy="90" r="1.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="1100" cy="60" r="1" fill="#ffffff" opacity="0.7"/>

  <!-- Fog effect -->
  <ellipse cx="300" cy="350" rx="200" ry="30" fill="url(#fogGradient)"/>
  <ellipse cx="700" cy="360" rx="250" ry="25" fill="url(#fogGradient)"/>
  <ellipse cx="1000" cy="340" rx="180" ry="35" fill="url(#fogGradient)"/>

  <!-- Big wavy land formation (night version) - behind trees -->
  <path d="M0,320 Q150,280 300,310 T600,290 Q750,330 900,300 T1200,320 L1200,400 L0,400 Z" fill="url(#nightLandGradient)"/>
  <path d="M0,350 Q200,320 400,340 T800,330 Q1000,360 1200,340 L1200,400 L0,400 Z" fill="url(#nightLandTexture)" opacity="0.6"/>
  <path d="M0,370 Q250,350 500,365 T1000,355 Q1150,375 1200,370 L1200,400 L0,400 Z" fill="#000000" opacity="0.4"/>

  <!-- Forest trees - front layer (in front of land) -->
  <path d="M50,400 L35,350 L45,320 L40,280 L50,250 L55,220 L60,250 L65,280 L60,320 L70,350 L55,400 Z" fill="url(#nightTreeGradient)"/>
  <path d="M120,400 L105,360 L115,330 L110,290 L120,260 L125,230 L130,260 L135,290 L130,330 L140,360 L125,400 Z" fill="url(#nightTreeGradient)"/>
  <path d="M200,400 L185,370 L195,340 L190,300 L200,270 L205,240 L210,270 L215,300 L210,340 L220,370 L205,400 Z" fill="url(#nightTreeGradient)"/>
  <path d="M280,400 L265,380 L275,350 L270,310 L280,280 L285,250 L290,280 L295,310 L290,350 L300,380 L285,400 Z" fill="url(#nightTreeGradient)"/>
  <path d="M350,400 L335,390 L345,360 L340,320 L350,290 L355,260 L360,290 L365,320 L360,360 L370,390 L355,400 Z" fill="url(#nightTreeGradient)"/>

  <!-- Mid-ground trees (even darker) -->
  <path d="M450,400 L430,360 L445,320 L435,270 L450,230 L460,200 L470,230 L480,270 L470,320 L485,360 L465,400 Z" fill="#0d2818"/>
  <path d="M550,400 L530,370 L545,330 L535,280 L550,240 L560,210 L570,240 L580,280 L570,330 L585,370 L565,400 Z" fill="#0d2818"/>
  <path d="M650,400 L630,380 L645,340 L635,290 L650,250 L660,220 L670,250 L680,290 L670,340 L685,380 L665,400 Z" fill="#0d2818"/>

  <!-- Foreground trees (darkest) -->
  <path d="M750,400 L725,350 L745,300 L730,240 L750,190 L770,160 L790,190 L810,240 L795,300 L815,350 L790,400 Z" fill="#0a1f0f"/>
  <path d="M900,400 L875,360 L895,310 L880,250 L900,200 L920,170 L940,200 L960,250 L945,310 L965,360 L940,400 Z" fill="#0a1f0f"/>
  <path d="M1050,400 L1025,370 L1045,320 L1030,260 L1050,210 L1070,180 L1090,210 L1110,260 L1095,320 L1115,370 L1090,400 Z" fill="#0a1f0f"/>

  <!-- Moon glow effect -->
  <circle cx="150" cy="100" r="40" fill="#ffffff" opacity="0.1"/>
  <circle cx="150" cy="100" r="25" fill="#ffffff" opacity="0.15"/>
</svg>